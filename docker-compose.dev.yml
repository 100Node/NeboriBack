services:
  auth:
    build: ./services/auth
    container_name: nebori_auth
    environment:
      DJANGO_SECRET_KEY: dev-insecure-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: nebori_auth
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "8002:8000"

  user:
    build: ./services/user
    container_name: nebori_user
    environment:
      DJANGO_SECRET_KEY: dev-insecure-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: nebori_user
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "8003:8000"
    volumes:
      - user_media:/app/media

  db:
    image: postgres:16-alpine
    container_name: nebori_auth_db
    environment:
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebori -d nebori_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d

  upload:
    build:
      context: ./services/upload
      dockerfile: Dockerfile.dev
    container_name: nebori-upload-serv
    environment:
      POSTGRES_DB: upload_tasks_db
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET_NAME: raw-videos
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      ENVIRONMENT: LOCAL
      DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./services/upload:/app

  video_metadata:
    build:
      context: ./services/video_metadata
      dockerfile: Dockerfile.dev
    container_name: nebori-video_metadata-serv
    environment:
      POSTGRES_DB: video_metadata_db
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET_NAME: processed-videos
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      ENVIRONMENT: LOCAL
      DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8001:8000"
    volumes:
      - ./services/video_metadata:/app

  transcoding:
    build:
      context: ./services/transcoding
      dockerfile: Dockerfile.dev
    container_name: nebori-transcoding-serv
    environment:
      POSTGRES_DB: transcoding_db
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET_NAME: raw-videos
      S3_PROCESSED_BUCKET_NAME: processed-videos
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      ENVIRONMENT: LOCAL
      DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./services/transcoding:/app

  pgadmin:
    image: dpage/pgadmin4
    container_name: nebori_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nebori-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nebori-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  user_media:
  rabbitmq_data:
