services:
  db:
    image: postgres:16-alpine
    container_name: nebori_db
    env_file:
      - .env.dev.root
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    ports:
     - "5434:5432" 
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'" ]
      interval: 10s
      timeout: 3s
      retries: 3

  upload:
    build:
      context: ./services/upload
      dockerfile: Dockerfile.dev
    container_name: nebori-upload-serv
    env_file:
      - .env.dev.root
      - .env.dev.upload
    ports:
      - "8008:8000"  # Main port for API
    volumes:
      - ./services/upload:/app
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload 

  minio:
    image: minio/minio:latest
    container_name: nebori-minio
    command: server /data --console-address ":9001"
    env_file:
    - .env.dev.root
    ports:
      - "9000:9000"  # Main port for API
      - "9001:9001"  # Admin port
    volumes:
      - minio_data:/data


volumes:
  minio_data:
  postgres_data: