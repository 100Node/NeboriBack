services:
  auth:
    build: ./services/auth
    container_name: nebori_auth
    env_file:
      - .env.dev.root
      - .env.dev.auth
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "8104:8000"
    networks:
      - nebori-network

  user:
    build: ./services/user
    container_name: nebori_user
    env_file:
      - .env.dev.root
      - .env.dev.user
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "8105:8000"
    volumes:
      - user_media:/app/media
    networks:
      - nebori-network

  db:
    image: postgres:16-alpine
    container_name: nebori_db
    env_file:
      - .env.dev.root
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U nebori_admin -d default_db'"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - nebori-network

  upload:
    build:
      context: ./services/upload
      dockerfile: Dockerfile.dev
    container_name: nebori-upload-serv
    env_file:
      - .env.dev.root
      - .env.dev.upload
    ports:
      - "8101:8000"
    volumes:
      - ./services/upload:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    # ДОДАНО: --root-path /api/upload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --root-path /api/upload
    networks:
      - nebori-network

  transcoding:
    build:
      context: ./services/transcoding
      dockerfile: Dockerfile.dev
    container_name: nebori-transcoding-serv
    env_file:
      - .env.dev.root
      - .env.dev.transcoding
    ports:
      - "8102:8000"
    volumes:
      - ./services/transcoding:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    command: faststream run app.main:app --reload
    networks:
      - nebori-network

  metadata:
    build:
      context: ./services/video_metadata
      dockerfile: Dockerfile.dev
    container_name: nebori-video_metadata-serv
    env_file:
      - .env.dev.root
      - .env.dev.video_metadata
    ports:
      - "8103:8000"
    volumes:
      - ./services/video_metadata:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    # ДОДАНО: --root-path /api/metadata
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --root-path /api/metadata
    networks:
      - nebori-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: nebori_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - nebori-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nebori-rabbitmq
    env_file:
      - .env.dev.root
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nebori-network

  nginx:
    image: nginx:alpine
    container_name: nebori-nginx
    ports:
      - "8180:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - upload
      - metadata
      - auth
      - user
      - minio
    networks:
      - nebori-network

  minio:
    image: minio/minio:latest
    container_name: nebori-minio
    command: server /data --console-address ":9001"
    # ТУТ ЖОРСТКО ВКАЗУЄМО ЛОГІН І ПАРОЛЬ, ЩОБ ТОЧНО ПРАЦЮВАЛА АДМІНКА
    environment:
      - MINIO_ROOT_USER=nebori_admin
      - MINIO_ROOT_PASSWORD=SuperSecretPassword123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - nebori-network

  consul:
    image: hashicorp/consul:latest
    container_name: nebori-consul
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    ports:
      - "8500:8500"
    networks:
      - nebori-network

  achievements:
    build:
      context: ./services/achievements
      dockerfile: Dockerfile.dev
    container_name: nebori-achievements-serv
    env_file:
      - .env.dev.root
      - .env.dev.achievements
    ports:
      - "8106:8000"
    volumes:
      - ./services/achievements:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --root-path /api/achievements
    networks:
      - nebori-network

  notifications:
    build:
      context: ./services/notifications
      dockerfile: Dockerfile.dev
    container_name: nebori-notifications-serv
    env_file:
      - .env.dev.root
      - .env.dev.notifications
    ports:
      - "8107:8000"
    volumes:
      - ./services/notifications:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --root-path /api/notifications
    networks:
      - nebori-network

networks:
  nebori-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  user_media:
  rabbitmq_data:
