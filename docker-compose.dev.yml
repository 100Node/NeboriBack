services:
  db:
    image: postgres:16-alpine
    container_name: nebori_db
    env_file:
      - .env.dev.root
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    ports:
     - "5434:5432" 
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'" ]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - nebori-network

  upload:
    build:
      context: ./services/upload
      dockerfile: Dockerfile.dev
    container_name: nebori-upload-serv
    env_file:
      - .env.dev.root
      - .env.dev.upload
    ports:
      - "8101:8000"  # Main port for API
    volumes:
      - ./services/upload:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - nebori-network

  transcoding:
    build:
      context: ./services/transcoding
      dockerfile: Dockerfile.dev
    container_name: nebori-transcoding-serv
    env_file:
      - .env.dev.root
      - .env.dev.transcoding
    ports:
      - "8102:8000"  # Main port for API
    volumes:
      - ./services/transcoding:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    command: faststream run app.main:app --reload
    networks:
      - nebori-network

  metadata:
    build:
      context: ./services/video_metadata
      dockerfile: Dockerfile.dev
    container_name: nebori-video_metadata-serv
    env_file:
      - .env.dev.root
      - .env.dev.video_metadata
    ports:
      - "8103:8000"  # Main port for API
    volumes:
      - ./services/video_metadata:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: /app/scripts/entrypoint-dev.sh
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - nebori-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nebori-rabbitmq
    env_file:
      - .env.dev.root
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nebori-network

  minio:
    image: minio/minio:latest
    container_name: nebori-minio
    command: server /data --console-address ":9001"
    env_file:
    - .env.dev.root
    ports:
      - "9000:9000"  # Main port for API
      - "9001:9001"  # Admin port
    volumes:
      - minio_data:/data

networks:
  nebori-network:
    driver: bridge

volumes:
  minio_data:
  postgres_data:
  rabbitmq_data: