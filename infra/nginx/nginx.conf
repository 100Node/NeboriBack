worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Вказуємо ВНУТРІШНІ порти контейнерів (8000 і 9000), а не ті, що на хості
    upstream upload   { server nebori-upload-serv:8000; }
    upstream metadata { server nebori-video_metadata-serv:8000; }
    upstream auth     { server nebori_auth:8000; }
    upstream user     { server nebori_user:8000; }
    upstream minio    { server nebori-minio:9000; }

    server {
        listen 80;

        # Upload service
        location /api/upload/ {
            proxy_pass http://upload/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect off;
            client_max_body_size 5G;
        }

        # Metadata service
        location /api/metadata/ {
            proxy_pass http://metadata/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect off;
        }

        # Auth service (Django)
        location /api/auth/ {
            proxy_pass http://auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;  
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Для Django передаємо оригінальний скрипт-шлях
            proxy_set_header X-Script-Name /api/auth;
            proxy_redirect off;
        }

        # User service (Django)
        location /api/user/ {
            proxy_pass http://user/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;  
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Script-Name /api/user;
            proxy_redirect off;       
        }

        # MinIO — публічні відео файли
        location /media/ {
            proxy_pass http://minio/processed-videos/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;

            # CORS для HLS
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
        }
    }
}