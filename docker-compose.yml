services:
  auth:
    build: ./services/auth
    container_name: nebori_auth
    environment:
      DJANGO_SECRET_KEY: change-this-in-production
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: nebori_auth
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      RABBITMQ_HOST: rabbitmq
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8002:8000"

  user:
    build: ./services/user
    container_name: nebori_user
    environment:
      DJANGO_SECRET_KEY: change-this-in-production
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: nebori_user
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      RABBITMQ_HOST: rabbitmq
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8003:8000"
    volumes:
      - user_media:/app/media

  notifications:
    build: ./services/notifications
    container_name: nebori_notifications
    environment:
      DJANGO_SECRET_KEY: change-this-in-production
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: nebori_notifications
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8005:8000"

  notifications_consumer:
    build: ./services/notifications
    container_name: nebori_notifications_consumer
    command: python manage.py run_consumer
    environment:
      DJANGO_SECRET_KEY: change-this-in-production
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: nebori_notifications
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: nebori_auth_db
    environment:
      POSTGRES_MULTIPLE_DATABASES: nebori_auth,nebori_user,nebori_notifications
      POSTGRES_USER: nebori
      POSTGRES_PASSWORD: nebori
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebori -d nebori_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4
    container_name: nebori_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com # Ваша пошта для входу в pgAdmin
      PGADMIN_DEFAULT_PASSWORD: admin # Ваш пароль для входу в pgAdmin
    ports:
      - "5050:80" # pgAdmin буде доступний на порту 5050
    depends_on:
      - db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nebori_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nebori_minio
    # Запускаємо сервер і вказуємо порт для адмінки (9001)
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # Головний порт для API (сюди буде стукати FastAPI)
      - "9001:9001" # Порт для веб-адмінки (сюди будеш заходити ти через браузер)
    environment:
      MINIO_ROOT_USER: admin # Твій Access Key (Логін)
      MINIO_ROOT_PASSWORD: password123 # Твій Secret Key (Пароль)
    volumes:
      - minio_data:/data # Зберігаємо дані на диску, щоб вони не зникли після рестарту

volumes:
  postgres_data:
  minio_data: # Оголошуємо volume
  user_media:
